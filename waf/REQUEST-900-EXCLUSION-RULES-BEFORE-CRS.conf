# Exclude application cookies from CRS inspection.
# The appSession cookie is a signed JWT (base64 with dots/slashes) that
# triggers false-positive SQL-injection, XSS, and protocol rules.
# __stripe_mid also contains opaque values that trigger false positives.
#
# Using SecRuleUpdateTargetByTag to blanket-exclude these cookies from
# all OWASP CRS rules that inspect REQUEST_COOKIES.

SecRuleUpdateTargetByTag "OWASP_CRS" "!REQUEST_COOKIES:/appSession/"
SecRuleUpdateTargetByTag "OWASP_CRS" "!REQUEST_COOKIES:/__stripe_mid/"

# Exclude candidate-signup JSON body fields from all CRS rules.
# The _rawCV field contains extracted CV text (tech keywords, tool names, shell
# command syntax in job descriptions) which reliably triggers false-positive
# RCE / SQLi / XSS rules (932110, 932115, etc.).
# The _cvFileBase64 field is a base64-encoded PDF — opaque binary, not commands.
# These fields are only accepted on the /api/public/candidate-signup endpoint
# and are never executed; the text is stored verbatim in the database.
# _cvFileName is also excluded because filenames with parentheses (e.g.
# "report (2) (1).pdf") trigger the PHP injection rule 933210.
SecRule REQUEST_URI "@beginsWith /api/public/candidate-signup" \
    "id:1100,phase:1,pass,nolog,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:json._rawCV,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:json._cvFileBase64,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:json._cvFileName"
