services:
  app:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .env.local
    command: sh -c "if [ -n \"$$SMTP_PASS_FILE\" ] && [ -f \"$$SMTP_PASS_FILE\" ]; then export SMTP_PASS=\"$$(cat \"$$SMTP_PASS_FILE\")\"; fi; npm install && npx prisma generate && npx prisma db push && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:/app/prisma/demo.db
      - APP_BASE_URL=${APP_BASE_URL:-https://localhost:8443}
      - LITELLM_API_BASE=http://host.docker.internal:4001/v1
      - EMAIL_GENERATION_DISABLED=false
      - DEFAULT_C2C_PARTNER_NAME=DotCloud Consulting
      - WATCHPACK_POLLING=true
      - CANDIDATE_SIGNUP_REDIRECT_URL=${CANDIDATE_SIGNUP_REDIRECT_URL:-https://localhost:8082/candidate-signup}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  waf:
    image: owasp/modsecurity-crs:nginx
    ports:
      - "${WAF_LISTEN_ADDRESS:-192.168.1.161}:${WAF_PORT:-8443}:8443"
      - "127.0.0.1:${WAF_HTTP_PORT:-9081}:8080"
    environment:
      - BACKEND=http://app:3000
      - MODSEC_RULE_ENGINE=On
      - PARANOIA=1
      - ANOMALY_IN=5
      - ANOMALY_OUT=4
      - ALLOWED_METHODS=GET HEAD POST OPTIONS PUT PATCH DELETE
      - MODSEC_REQ_BODY_NOFILES_LIMIT=13107200
      - NGINX_BODY_MAX_SIZE=16m
      - SSL_PORT=8443
      - SSL_CERT_FILE=/etc/nginx/certs/fullchain.pem
      - SSL_CERT_KEY_FILE=/etc/nginx/certs/privkey.pem
    volumes:
      - ${SSL_CERT_DIR:-./SSL/certs}/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ${SSL_CERT_DIR:-./SSL/certs}/privkey.pem:/etc/nginx/certs/privkey.pem:ro
      - ./waf/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
    depends_on:
      - app
    restart: unless-stopped
