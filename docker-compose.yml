services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    ports:
      - "3001:3000"
    command: sh -c "if [ -n \"$$SMTP_PASS_FILE\" ] && [ -f \"$$SMTP_PASS_FILE\" ]; then export SMTP_PASS=\"$$(cat \"$$SMTP_PASS_FILE\")\"; fi; PORT=3000 node server.js"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/prod.db?connection_limit=1&busy_timeout=15000
      - LLMLITE_API_BASE=http://ollama-ollama-1:11434/v1
      - LLMLITE_API_KEY=ollama
      - OPENAI_API_BASE=http://ollama-ollama-1:11434/v1
      - OPENAI_API_KEY=ollama
      - OPENAI_MODEL=deepseek-v4-flash:cloud
      - EMAIL_GENERATION_DISABLED=false
      - ENFORCE_ATS_EMAIL_SAFETY_GATE=false
      - BYPASS_ROLE_MATCH_GUARD=false
      - SKIP_FACTUALITY_GUARD=false
      - DEFAULT_C2C_PARTNER_NAME=DotCloud Consulting
    volumes:
      - ./:/app/data
      - db:/app/db
    restart: unless-stopped
    networks:
      - default
      - placements_gateway
      - ollama_default

  waf:
    image: owasp/modsecurity-crs:nginx
    ports:
      - "${WAF_LISTEN_ADDRESS:-192.168.1.161}:${WAF_PORT:-8082}:8443"
      - "127.0.0.1:${WAF_HTTP_PORT:-9082}:8080"
    environment:
      - BACKEND=http://app:3000
      - MODSEC_RULE_ENGINE=On
      - PARANOIA=1
      - ANOMALY_IN=5
      - ANOMALY_OUT=4
      - ALLOWED_METHODS=GET HEAD POST OPTIONS PUT PATCH DELETE
      - MODSEC_REQ_BODY_NOFILES_LIMIT=13107200
      - NGINX_BODY_MAX_SIZE=16m
      - SSL_PORT=8443
      - SSL_CERT_FILE=/etc/nginx/certs/fullchain.pem
      - SSL_CERT_KEY_FILE=/etc/nginx/certs/privkey.pem
    volumes:
      - ${SSL_CERT_DIR:-./SSL/certs}/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ${SSL_CERT_DIR:-./SSL/certs}/privkey.pem:/etc/nginx/certs/privkey.pem:ro
      - ./waf/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
    depends_on:
      - app
    restart: unless-stopped

networks:
  placements_gateway:
    external: true
  ollama_default:
    external: true

volumes:
  db:
    external: true
    name: contract_placements_prod_db
